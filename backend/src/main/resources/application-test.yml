spring:
  datasource:
    url: jdbc:h2:mem:communitymvp;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  health:
    redis:
      enabled: false

community-mvp:
  runtime:
    database-enabled: true
  security:
    jwt-enabled: true
    jwt-secret: test-secret
  cache:
    redis-enabled: false
  docs:
    openapi-enabled: false
