spring:
  datasource:
    url: ${COMMUNITY_MVP_DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: root
    password: 1231
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${COMMUNITY_MVP_REDIS_HOST:localhost}
      port: ${COMMUNITY_MVP_REDIS_PORT:6379}

community-mvp:
  runtime:
    database-enabled: true
  security:
    jwt-enabled: true
    jwt-secret: ${COMMUNITY_MVP_JWT_SECRET:change-me}
  cache:
    redis-enabled: false
  docs:
    openapi-enabled: false
