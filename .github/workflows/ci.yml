name: Java 持续集成

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: 运行 Maven 测试
        if: hashFiles('backend/pom.xml') != ''
        run: mvn -B -ntp -f backend/pom.xml test

      - name: 目前还没有 Maven 项目
        if: hashFiles('backend/pom.xml') == ''
        run: echo "当前还没有 backend/pom.xml；请先添加 Maven 项目以启用 CI。"
